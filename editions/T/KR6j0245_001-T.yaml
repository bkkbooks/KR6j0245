body:
  text: 失譯人名今附梁錄如是我聞一時婆伽婆住王舍城耆闍崛山中與大比丘眾五百人俱爾時長老阿難為旃陀梨女呪術所收爾時長老阿難白佛言世尊我今強為他收去婆伽婆我今強為他收去修伽陀爾時婆伽婆告長老阿難言汝來阿難汝莫驚怖阿難汝當受持六字大陀羅尼呪為令四眾利益安隱安樂吉祥行故而說呪曰斯須何反地除隷反梯吐稽反曇徒紺反安於軻反茶徒嫁反隸般茶徒嫁反隸葛羅馳除寄反稽由隷薩帝婆帝耶𮚒婆帝底闍婆帝頻頭摩帝阿難是呪能令宿食不消尋得消化能除吐下等病能除風病熱病冷病雜病能滅一切諸邪呪術能滅起屍能滅一切形像厭蠱阿難若有人知此神呪姓名者彼則不怖畏王難不怖畏怨敵難不怖畏賊難不怖畏火難不怖畏水難若於城邑聚落及在曠野悉無所畏亦不為他人伺求其過無過可說若食毒藥毒不能害轉為利益阿難此六字大陀羅尼呪乃是七三藐三佛陀所說亦是梵王娑婆主說釋提桓因四大天王所說亦皆隨喜破諸呪術消伏起屍一切形像厭蠱皆悉破壞斷滅長老阿難聞佛所說歡喜奉行
